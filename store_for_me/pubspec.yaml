name: store_for_me
description: "Shop Radar - Hyperlocal Shop Discovery & Delivery"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Networking
  dio: ^5.7.0
  
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  
  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  smooth_page_indicator: ^1.2.0+3
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.2
  lottie: ^3.1.3
  
  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  
  # Image & Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  camera: ^0.11.0+2
  path_provider: ^2.1.5
  
  # Real-time
  socket_io_client: ^3.0.2
  
  # Utils
  intl: any
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  
  # Payment
  razorpay_flutter: ^1.3.7
  mobile_scanner: ^7.2.0
  multicast_dns: ^0.3.3
  file_picker: ^11.0.2
  network_info_plus: ^7.0.0
  path: ^1.9.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
